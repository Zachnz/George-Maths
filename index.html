<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Facts Worksheet</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4ff; --white:#fff; --border:#d0d8f0; --text:#1a1f3a; --muted:#7a829e;
  --add:#2563eb; --sub:#7c3aed; --mul:#d97706; --div:#dc2626;
  --add-bg:#eff6ff; --sub-bg:#f5f3ff; --mul-bg:#fffbeb; --div-bg:#fff5f5;
  --correct:#059669; --wrong:#dc2626;
  --timer-good:#059669; --timer-warn:#d97706; --timer-bad:#dc2626;
  --gold:#f59e0b; --silver:#94a3b8; --bronze:#b45309;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito Sans',sans-serif;min-height:100vh;}
 
/* ── PLAYER SELECT ── */
#player-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem;text-align:center;
}
.logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(2.5rem,8vw,4.5rem);color:var(--text);margin-bottom:0.15rem;}
.logo span{color:var(--add);}
.logo-sub{color:var(--muted);font-size:1rem;margin-bottom:2.5rem;}
 
.player-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:0.9rem;
  max-width:520px;width:100%;margin-bottom:2rem;
}
@media(max-width:400px){.player-grid{grid-template-columns:repeat(2,1fr);}}
.player-card{
  background:var(--white);border:2.5px solid var(--border);border-radius:16px;
  padding:1.1rem 0.8rem;cursor:pointer;transition:all 0.15s;
  display:flex;flex-direction:column;align-items:center;gap:0.4rem;
  position:relative;
}
.player-card:hover{border-color:var(--add);transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,99,235,0.15);}
.player-card.selected{border-color:var(--add);background:var(--add-bg);box-shadow:0 0 0 3px rgba(37,99,235,0.2);}
.player-avatar{
  width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;color:#fff;
}
.player-name{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;}
.player-best{font-size:0.72rem;color:var(--muted);font-weight:600;}
.player-attempts{font-size:0.68rem;color:var(--muted);}
.player-badge{
  position:absolute;top:-8px;right:-8px;
  width:22px;height:22px;border-radius:50%;border:2px solid var(--white);
  display:flex;align-items:center;justify-content:center;font-size:0.75rem;
}
 
.btn-go{
  background:var(--add);color:#fff;border:none;border-radius:16px;
  padding:1rem 3rem;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;
  cursor:pointer;transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s;
  box-shadow:0 4px 20px rgba(37,99,235,0.35);opacity:0.4;pointer-events:none;
}
.btn-go.active{opacity:1;pointer-events:auto;}
.btn-go.active:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(37,99,235,0.45);}
 
.lb-link{
  margin-top:1.2rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;
  color:var(--add);cursor:pointer;text-decoration:underline;
}
 
/* ── LEADERBOARD SCREEN ── */
#lb-screen{
  display:none;min-height:100vh;padding:2rem 1rem;
  max-width:700px;margin:0 auto;
}
.lb-header{display:flex;align-items:center;gap:1rem;margin-bottom:2rem;}
.lb-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.8rem;flex:1;}
.lb-back{background:transparent;border:2px solid var(--border);border-radius:10px;padding:0.4rem 1rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.lb-back:hover{border-color:var(--text);color:var(--text);}
 
.lb-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.lb-tab{
  padding:0.4rem 1rem;border-radius:999px;border:2px solid var(--border);
  font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;
  background:var(--white);color:var(--muted);cursor:pointer;transition:all 0.15s;
}
.lb-tab.active{background:var(--add);border-color:var(--add);color:#fff;}
 
.lb-table{background:var(--white);border:2px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:2rem;}
.lb-row{
  display:grid;grid-template-columns:40px 1fr 80px 80px 80px;
  align-items:center;padding:0.8rem 1.2rem;border-bottom:1px solid var(--border);
  gap:0.5rem;
}
.lb-row:last-child{border-bottom:none;}
.lb-row.header{background:var(--bg);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
.lb-rank{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;text-align:center;}
.lb-rank.r1{color:var(--gold);}
.lb-rank.r2{color:var(--silver);}
.lb-rank.r3{color:var(--bronze);}
.lb-player-info{display:flex;align-items:center;gap:0.7rem;}
.lb-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:0.85rem;color:#fff;flex-shrink:0;}
.lb-pname{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.95rem;}
.lb-attempts-sm{font-size:0.7rem;color:var(--muted);}
.lb-val{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.95rem;text-align:center;}
.lb-val.good{color:var(--correct);}
.lb-val.meh{color:var(--timer-warn);}
.lb-val.none{color:var(--muted);font-weight:400;}
 
/* Per-person history */
.person-history{background:var(--white);border:2px solid var(--border);border-radius:16px;overflow:hidden;}
.ph-header{padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.8rem;}
.ph-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;}
.ph-row{
  display:grid;grid-template-columns:30px 80px 1fr 80px;
  align-items:center;padding:0.65rem 1.2rem;border-bottom:1px solid var(--border);
  gap:0.5rem;font-family:'Nunito',sans-serif;
}
.ph-row:last-child{border-bottom:none;}
.ph-row.header{background:var(--bg);font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
.ph-num{font-size:0.75rem;color:var(--muted);font-weight:600;text-align:center;}
.ph-score{font-weight:800;font-size:0.95rem;}
.ph-time{font-weight:700;font-size:0.85rem;color:var(--muted);}
.ph-bar-wrap{height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.ph-bar-fill{height:100%;border-radius:4px;background:var(--add);}
.ph-pb{font-size:0.65rem;background:#fef3c7;color:#92400e;border-radius:4px;padding:1px 5px;font-weight:700;margin-left:4px;}
 
/* ── WORKSHEET ── */
#worksheet-screen{display:none;}
.ws-header{
  background:var(--white);border-bottom:2px solid var(--border);
  padding:0.75rem 1.5rem;display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:50;
}
.ws-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;color:var(--text);}
.ws-title span{color:var(--add);}
.ws-player-pill{
  display:flex;align-items:center;gap:0.5rem;margin-right:auto;
  background:var(--bg);border:2px solid var(--border);border-radius:999px;
  padding:0.25rem 0.8rem 0.25rem 0.35rem;
}
.ws-player-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:0.75rem;color:#fff;}
.ws-player-name{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.85rem;}
.answered-count{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;color:var(--muted);white-space:nowrap;}
.answered-count strong{color:var(--text);}
.timer-box{display:flex;align-items:center;gap:0.5rem;background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:0.4rem 0.9rem;}
.timer-val{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;min-width:60px;color:var(--timer-good);transition:color 0.3s;}
.countdown-wrap{position:relative;width:44px;height:44px;flex-shrink:0;}
.countdown-wrap svg{transform:rotate(-90deg);}
.countdown-bg{fill:none;stroke:var(--border);stroke-width:4;}
.countdown-arc{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 0.5s linear,stroke 0.5s;}
.countdown-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:0.6rem;color:var(--muted);line-height:1;text-align:center;}
.pace-pill{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.8rem;padding:0.3rem 0.8rem;border-radius:999px;border:2px solid;transition:all 0.3s;white-space:nowrap;}
.btn-submit{background:var(--correct);color:white;border:none;border-radius:12px;padding:0.5rem 1.4rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.95rem;cursor:pointer;transition:opacity 0.15s,transform 0.15s;white-space:nowrap;}
.btn-submit:hover{opacity:0.88;transform:translateY(-1px);}
.progress-bar-wrap{height:5px;background:var(--border);position:sticky;top:67px;z-index:49;}
.progress-bar-fill{height:100%;background:var(--add);transition:width 0.3s ease;width:0%;}
.ws-body{padding:1.5rem;max-width:1100px;margin:0 auto;}
.section-block{margin-bottom:2rem;}
.section-header{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.75rem;}
.section-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;text-transform:uppercase;letter-spacing:0.06em;}
.section-line{flex:1;height:2px;border-radius:1px;}
.section-count{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.8rem;color:var(--muted);}
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:0.55rem;}
.q-cell{background:var(--white);border:2px solid var(--border);border-radius:12px;padding:0.65rem 0.75rem;display:flex;align-items:center;gap:0.4rem;transition:border-color 0.2s,box-shadow 0.15s;position:relative;}
.q-cell:focus-within{border-color:var(--cell-color,var(--add));box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
.q-cell.correct{background:#f0fdf4;border-color:var(--correct);}
.q-cell.wrong{background:#fff5f5;border-color:var(--wrong);cursor:help;}
.q-cell.wrong::after{content:attr(data-answer);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1f3a;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.82rem;padding:0.3rem 0.7rem;border-radius:8px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:20;}
.q-cell.wrong::before{content:'';position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1a1f3a;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:20;}
.q-cell.wrong:hover::after,.q-cell.wrong:hover::before{opacity:1;}
.q-num{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.62rem;color:var(--muted);position:absolute;top:4px;left:6px;}
.q-expr{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;color:var(--text);white-space:nowrap;flex:1;text-align:right;padding-right:0.15rem;}
.q-input{width:50px;border:none;outline:none;background:transparent;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;text-align:center;color:var(--text);border-bottom:2px solid var(--border);border-radius:0;padding:0 2px;transition:border-color 0.2s;-moz-appearance:textfield;}
.q-input::-webkit-outer-spin-button,.q-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.q-input:focus{border-bottom-color:var(--cell-color,var(--add));}
.q-input.filled{color:var(--add);border-bottom-color:var(--add);}
.q-cell.correct .q-input{color:var(--correct);}
.q-cell.wrong .q-input{color:var(--wrong);}
.q-result-icon{font-size:0.95rem;display:none;font-style:normal;}
.q-cell.correct .q-result-icon{display:block;color:var(--correct);}
.q-cell.wrong .q-result-icon{display:block;color:var(--wrong);}
 
/* ── RESULTS ── */
#results-screen{display:none;position:fixed;inset:0;z-index:200;background:rgba(240,244,255,0.97);flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem 1rem;overflow-y:auto;text-align:center;}
.results-inner{max-width:680px;width:100%;}
.res-badge{display:inline-block;background:var(--white);border:3px solid var(--border);border-radius:999px;padding:0.3rem 1.2rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.85rem;color:var(--muted);margin-bottom:1rem;letter-spacing:0.05em;text-transform:uppercase;}
.res-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(2rem,7vw,3.5rem);margin-bottom:0.25rem;}
.res-score{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(3.5rem,12vw,6rem);color:var(--add);line-height:1;margin-bottom:0.5rem;}
.res-pb-banner{background:#fef3c7;border:2px solid #f59e0b;border-radius:12px;padding:0.6rem 1.2rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.95rem;color:#92400e;margin-bottom:0.8rem;display:none;}
.res-meta{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.res-meta-item{background:var(--white);border:2px solid var(--border);border-radius:12px;padding:0.6rem 1rem;font-family:'Nunito',sans-serif;font-size:0.9rem;}
.res-meta-item strong{font-weight:800;color:var(--text);}
.res-cats{display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem;margin-bottom:1.5rem;}
@media(max-width:480px){.res-cats{grid-template-columns:repeat(2,1fr);}}
.res-cat{background:var(--white);border:2px solid var(--border);border-radius:12px;padding:0.9rem 0.7rem;position:relative;overflow:hidden;}
.res-cat-name{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.25rem;}
.res-cat-score{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.8rem;}
.res-cat-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:0.4rem;overflow:hidden;}
.res-cat-bar-fill{height:100%;border-radius:2px;}
.res-actions{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem;}
.btn-again{background:var(--add);color:white;border:none;border-radius:14px;padding:0.9rem 2rem;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;transition:opacity 0.15s;}
.btn-again:hover{opacity:0.85;}
.btn-review{background:transparent;color:var(--muted);border:2px solid var(--border);border-radius:14px;padding:0.8rem 1.5rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:border-color 0.15s,color 0.15s;}
.btn-review:hover{border-color:var(--text);color:var(--text);}
.btn-lb{background:transparent;color:var(--add);border:2px solid var(--add);border-radius:14px;padding:0.8rem 1.5rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.15s;}
.btn-lb:hover{background:var(--add);color:#fff;}
 
/* Mini leaderboard on results */
.mini-lb{background:var(--white);border:2px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:1.5rem;text-align:left;}
.mini-lb-title{padding:0.8rem 1.2rem;border-bottom:1px solid var(--border);font-family:'Nunito',sans-serif;font-weight:900;font-size:0.95rem;color:var(--text);}
.mini-lb-row{display:grid;grid-template-columns:32px 1fr 60px 70px;align-items:center;padding:0.6rem 1rem;border-bottom:1px solid var(--border);gap:0.5rem;}
.mini-lb-row:last-child{border-bottom:none;}
.mini-lb-row.highlight{background:var(--add-bg);}
.mini-rank{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;text-align:center;}
.mini-rank.r1{color:var(--gold);}
.mini-rank.r2{color:var(--silver);}
.mini-rank.r3{color:var(--bronze);}
.mini-info{display:flex;align-items:center;gap:0.6rem;}
.mini-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:0.75rem;color:#fff;flex-shrink:0;}
.mini-name{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.88rem;}
.mini-score{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.88rem;text-align:center;}
.mini-time{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.78rem;color:var(--muted);text-align:center;}
 
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border:2px solid var(--border);border-radius:20px;padding:2rem;max-width:360px;width:90%;text-align:center;}
.modal h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.5rem;margin-bottom:0.5rem;}
.modal p{color:var(--muted);font-size:0.9rem;line-height:1.6;margin-bottom:1.5rem;}
.modal p strong{color:var(--wrong);}
.modal-btns{display:flex;gap:0.75rem;}
.modal-btn{flex:1;border-radius:12px;padding:0.75rem;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;border:2px solid;transition:all 0.15s;}
.modal-btn.cancel{background:transparent;border-color:var(--border);color:var(--muted);}
.modal-btn.cancel:hover{border-color:var(--text);color:var(--text);}
.modal-btn.go{background:var(--correct);border-color:var(--correct);color:white;}
.modal-btn.go:hover{opacity:0.85;}
</style>
</head>
<body>
 
<!-- PLAYER SELECT -->
<section id="player-screen">
  <div class="logo">Math <span>Facts</span></div>
  <div class="logo-sub">Who's playing?</div>
  <div class="player-grid" id="player-grid"></div>
  <button class="btn-go" id="btn-go" onclick="beginQuiz()">Let's Go →</button>
  <div class="lb-link" onclick="showLeaderboard()">🏆 View Leaderboard</div>
</section>
 
<!-- LEADERBOARD -->
<section id="lb-screen">
  <div class="lb-header">
    <div class="lb-title">🏆 Leaderboard</div>
    <button class="lb-back" onclick="showPlayerScreen()">← Back</button>
  </div>
  <div class="lb-tabs" id="lb-tabs"></div>
  <div id="lb-content"></div>
</section>
 
<!-- WORKSHEET -->
<section id="worksheet-screen">
  <div class="ws-header">
    <div class="ws-title">Math <span>Facts</span></div>
    <div class="ws-player-pill">
      <div class="ws-player-av" id="ws-av"></div>
      <span class="ws-player-name" id="ws-player-name"></span>
    </div>
    <div class="answered-count"><strong id="ans-done">0</strong> / 100</div>
    <div class="countdown-wrap">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle class="countdown-bg" cx="22" cy="22" r="18"/>
        <circle class="countdown-arc" id="countdown-arc" cx="22" cy="22" r="18"
                stroke="var(--timer-good)" stroke-dasharray="113.1" stroke-dashoffset="0"/>
      </svg>
      <div class="countdown-label" id="countdown-label">6:30</div>
    </div>
    <div class="timer-box">
      <span>⏱</span>
      <span class="timer-val" id="timer-val">0:00</span>
    </div>
    <div class="pace-pill" id="pace-pill" style="color:var(--timer-good);border-color:var(--timer-good);background:#f0fdf4">—</div>
    <button class="btn-submit" id="btn-submit-header" onclick="trySubmit()">Submit →</button>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <div class="ws-body" id="ws-body"></div>
</section>
 
<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2>Submit?</h2>
    <p id="modal-msg"></p>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">Go Back</button>
      <button class="modal-btn go" onclick="finishQuiz()">Mark It ✓</button>
    </div>
  </div>
</div>
 
<!-- RESULTS -->
<section id="results-screen">
  <div class="results-inner">
    <div class="res-badge" id="res-player-badge"></div>
    <div class="res-title" id="res-title"></div>
    <div class="res-score" id="res-score"></div>
    <div class="res-pb-banner" id="res-pb-banner"></div>
    <div class="res-meta" id="res-meta"></div>
    <div class="res-cats" id="res-cats"></div>
    <div class="mini-lb" id="mini-lb"></div>
    <div class="res-actions">
      <button class="btn-again" onclick="showPlayerScreen()">🏠 Home</button>
      <button class="btn-lb" onclick="showLeaderboard()">🏆 Leaderboard</button>
      <button class="btn-review" onclick="showReview()">Review Answers ↓</button>
    </div>
  </div>
</section>
 
<script>
// ── CONFIG ──
const TOTAL=100, PER_CAT=25, TARGET_SECONDS=390;
const CIRCUMFERENCE=2*Math.PI*18;
 
const PLAYERS=[
  {name:'George',  color:'#6366f1'},
  {name:'Zach',    color:'#0ea5e9'},
  {name:'Matt',    color:'#10b981'},
  {name:'Kathryn', color:'#f43f5e'},
  {name:'Lucia',   color:'#f59e0b'},
  {name:'Bella',   color:'#a855f7'},
];
 
const CATS={
  add:{label:'Addition',       color:'var(--add)', bg:'var(--add-bg)'},
  sub:{label:'Subtraction',    color:'var(--sub)', bg:'var(--sub-bg)'},
  mul:{label:'Multiplication', color:'var(--mul)', bg:'var(--mul-bg)'},
  div:{label:'Division',       color:'var(--div)', bg:'var(--div-bg)'},
};
const CAT_ORDER=['add','sub','mul','div'];
 
// ── STATE ──
let currentPlayer=null, bycat={}, startTime=0, timerInterval=null;
let allData={}; // loaded from storage
 
// ── STORAGE HELPERS ──
async function loadData(){
  try{
    const r=await window.storage.get('mathfacts-leaderboard');
    allData=r?JSON.parse(r.value):{};
  }catch(e){ allData={}; }
}
async function saveData(){
  try{ await window.storage.set('mathfacts-leaderboard', JSON.stringify(allData)); }catch(e){}
}
function getPlayerData(name){
  if(!allData[name]) allData[name]={attempts:[],bestScore:null,bestTime:null};
  return allData[name];
}
 
// ── INIT ──
async function init(){
  await loadData();
  renderPlayerGrid();
  document.getElementById('player-screen').style.display='flex';
}
 
// ── PLAYER GRID ──
function renderPlayerGrid(){
  const grid=document.getElementById('player-grid');
  grid.innerHTML='';
  PLAYERS.forEach(p=>{
    const pd=getPlayerData(p.name);
    const attempts=pd.attempts.length;
    const best=pd.bestScore;
    const bestTime=pd.bestTime;
    const initials=p.name.slice(0,2).toUpperCase();
 
    // Rank badge
    const rank=getRankAmongAll(p.name,'score');
    let badgeHtml='';
    if(rank===1&&attempts>0) badgeHtml=`<div class="player-badge" style="background:var(--gold)">🥇</div>`;
    else if(rank===2&&attempts>0) badgeHtml=`<div class="player-badge" style="background:var(--silver)">🥈</div>`;
    else if(rank===3&&attempts>0) badgeHtml=`<div class="player-badge" style="background:var(--bronze)">🥉</div>`;
 
    const card=document.createElement('div');
    card.className='player-card';
    card.id=`pcard-${p.name}`;
    card.onclick=()=>selectPlayer(p.name);
    card.innerHTML=`
      ${badgeHtml}
      <div class="player-avatar" style="background:${p.color}">${initials}</div>
      <div class="player-name">${p.name}</div>
      <div class="player-best">${best!==null?`Best: ${best}/100`:'No attempts yet'}</div>
      <div class="player-attempts">${attempts} attempt${attempts!==1?'s':''}</div>
    `;
    grid.appendChild(card);
  });
}
 
function getRankAmongAll(name, by){
  const scored=PLAYERS.map(p=>{
    const pd=getPlayerData(p.name);
    return {name:p.name, best:pd.bestScore??-1};
  }).filter(x=>x.best>=0).sort((a,b)=>b.best-a.best);
  const idx=scored.findIndex(x=>x.name===name);
  return idx===-1?null:idx+1;
}
 
function selectPlayer(name){
  currentPlayer=name;
  document.querySelectorAll('.player-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById(`pcard-${name}`).classList.add('selected');
  const btn=document.getElementById('btn-go');
  btn.classList.add('active');
  btn.textContent=`Start as ${name} →`;
}
 
// ── START QUIZ ──
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=rand(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
 
function generate(){
  const bc={};
  bc.add=[]; for(let i=0;i<PER_CAT;i++){const a=rand(1,12),b=rand(1,12);bc.add.push({cat:'add',display:`${a} + ${b}`,answer:a+b});}
  bc.sub=[]; for(let i=0;i<PER_CAT;i++){const a=rand(2,20),b=rand(1,a);bc.sub.push({cat:'sub',display:`${a} − ${b}`,answer:a-b});}
  bc.mul=[]; for(let i=0;i<PER_CAT;i++){const a=rand(1,12),b=rand(1,12);bc.mul.push({cat:'mul',display:`${a} × ${b}`,answer:a*b});}
  bc.div=[]; for(let i=0;i<PER_CAT;i++){const a=rand(1,12),b=rand(1,12);bc.div.push({cat:'div',display:`${a*b} ÷ ${a}`,answer:b});}
  return bc;
}
 
function beginQuiz(){
  if(!currentPlayer) return;
  bycat=generate();
  const p=PLAYERS.find(x=>x.name===currentPlayer);
 
  // Header player pill
  document.getElementById('ws-av').style.background=p.color;
  document.getElementById('ws-av').textContent=p.name.slice(0,2).toUpperCase();
  document.getElementById('ws-player-name').textContent=p.name;
 
  document.getElementById('player-screen').style.display='none';
  document.getElementById('worksheet-screen').style.display='block';
 
  const hb=document.getElementById('btn-submit-header');
  hb.textContent='Submit →'; hb.style.background='var(--correct)'; hb.onclick=trySubmit;
 
  buildWorksheet();
  startTime=Date.now();
  timerInterval=setInterval(tick,500);
  setTimeout(()=>{const f=document.querySelector('.q-input');if(f)f.focus();},100);
}
 
function buildWorksheet(){
  const body=document.getElementById('ws-body'); body.innerHTML='';
  let gIdx=0;
  CAT_ORDER.forEach(key=>{
    const cat=CATS[key];
    const block=document.createElement('div'); block.className='section-block';
    const hdr=document.createElement('div'); hdr.className='section-header';
    hdr.innerHTML=`<div class="section-title" style="color:${cat.color}">${cat.label}</div><div class="section-line" style="background:${cat.color};opacity:0.25"></div><div class="section-count">25 questions</div>`;
    block.appendChild(hdr);
    const grid=document.createElement('div'); grid.className='q-grid';
    bycat[key].forEach(q=>{
      const idx=gIdx++;
      const cell=document.createElement('div');
      cell.className='q-cell'; cell.style.setProperty('--cell-color',cat.color); cell.dataset.idx=idx;
      cell.innerHTML=`<span class="q-num">${idx+1}</span><span class="q-expr">${q.display} =</span><input class="q-input" type="number" inputmode="numeric" id="inp-${idx}" autocomplete="off"><i class="q-result-icon"></i>`;
      grid.appendChild(cell);
    });
    block.appendChild(grid); body.appendChild(block);
  });
  document.querySelectorAll('.q-input').forEach(inp=>{
    inp.addEventListener('input',onInput);
    inp.addEventListener('keydown',onKeydown);
  });
}
 
function onInput(e){
  const inp=e.target;
  inp.className='q-input'+(inp.value!==''?' filled':'');
  updateProgress();
}
function onKeydown(e){
  if(e.key==='Enter'||e.key==='Tab'){
    e.preventDefault();
    const all=Array.from(document.querySelectorAll('.q-input'));
    const next=all[all.indexOf(e.target)+1];
    if(next) next.focus(); else trySubmit();
  }
}
function updateProgress(){
  const inputs=document.querySelectorAll('.q-input');
  let done=0; inputs.forEach(i=>{if(i.value.trim()!=='') done++;});
  document.getElementById('ans-done').textContent=done;
  document.getElementById('progress-fill').style.width=(done/TOTAL*100)+'%';
}
 
// ── TIMER ──
function tick(){
  const elapsed=(Date.now()-startTime)/1000;
  const remaining=Math.max(0,TARGET_SECONDS-elapsed);
  const em=Math.floor(elapsed/60),es=Math.floor(elapsed%60);
  document.getElementById('timer-val').textContent=`${em}:${String(es).padStart(2,'0')}`;
  const arc=document.getElementById('countdown-arc');
  const frac=remaining/TARGET_SECONDS;
  arc.style.strokeDashoffset=CIRCUMFERENCE*(1-frac);
  const rm=Math.floor(remaining/60),rs=Math.floor(remaining%60);
  document.getElementById('countdown-label').textContent=`${rm}:${String(rs).padStart(2,'0')}`;
  let ringColor=(frac>0.4)?'var(--timer-good)':(frac>0.15)?'var(--timer-warn)':'var(--timer-bad)';
  arc.style.stroke=ringColor;
  document.getElementById('timer-val').style.color=ringColor;
  const done=parseInt(document.getElementById('ans-done').textContent)||0;
  const pill=document.getElementById('pace-pill');
  let paceState;
  if(done<3){pill.textContent='Get going!';paceState='good';}
  else{
    const req=TARGET_SECONDS/TOTAL, act=elapsed/done;
    if(act<req*0.85){pill.textContent='On fire 🔥';paceState='good';}
    else if(act<=req*1.1){pill.textContent='Good pace ✓';paceState='good';}
    else if(act<=req*1.4){pill.textContent='Speed up ⚡';paceState='warn';}
    else{pill.textContent='Hurry up! ⏰';paceState='bad';}
  }
  const colors={good:'var(--timer-good)',warn:'var(--timer-warn)',bad:'var(--timer-bad)'};
  const bgs={good:'#f0fdf4',warn:'#fffbeb',bad:'#fff5f5'};
  pill.style.color=colors[paceState]; pill.style.borderColor=colors[paceState]; pill.style.background=bgs[paceState];
}
 
// ── SUBMIT ──
function trySubmit(){
  const inputs=document.querySelectorAll('.q-input');
  let blanks=0; inputs.forEach(i=>{if(i.value.trim()==='') blanks++;});
  document.getElementById('modal-msg').innerHTML=blanks>0
    ?`You have <strong>${blanks} unanswered question${blanks>1?'s':''}</strong>. Go back to fill them in, or submit now — blanks count as wrong.`
    :`All 100 answered! Ready to see your score?`;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
 
async function finishQuiz(){
  closeModal();
  clearInterval(timerInterval);
  const elapsed=(Date.now()-startTime)/1000;
 
  let gIdx=0, totalCorrect=0;
  const catScores={}; CAT_ORDER.forEach(k=>catScores[k]=0);
  CAT_ORDER.forEach(key=>{
    bycat[key].forEach(q=>{
      const idx=gIdx++;
      const inp=document.getElementById(`inp-${idx}`);
      const cell=inp.closest('.q-cell');
      const val=inp.value.trim();
      const given=val===''?null:parseFloat(val);
      const correct=given!==null&&given===q.answer;
      inp.setAttribute('disabled','');
      cell.classList.remove('correct','wrong');
      const icon=cell.querySelector('.q-result-icon');
      if(correct){cell.classList.add('correct');icon.textContent='✓';totalCorrect++;catScores[key]++;}
      else{cell.classList.add('wrong');icon.textContent='✗';cell.setAttribute('data-answer',`Answer: ${q.answer}`);}
    });
  });
 
  // Save to leaderboard
  const pd=getPlayerData(currentPlayer);
  const attempt={score:totalCorrect, time:Math.round(elapsed), date:new Date().toLocaleDateString('en-NZ')};
  pd.attempts.push(attempt);
  const isPB=(pd.bestScore===null||totalCorrect>pd.bestScore)||(totalCorrect===pd.bestScore&&elapsed<(pd.bestTime??Infinity));
  if(pd.bestScore===null||totalCorrect>pd.bestScore) pd.bestScore=totalCorrect;
  if(pd.bestTime===null||elapsed<pd.bestTime) pd.bestTime=Math.round(elapsed);
  await saveData();
 
  // Results display
  const pct=totalCorrect/TOTAL;
  let title='Keep Practising!';
  if(pct===1) title='Perfect! 🌟';
  else if(pct>=0.9) title='Excellent! 🎉';
  else if(pct>=0.75) title='Great Work!';
  else if(pct>=0.5) title='Good Effort!';
 
  const p=PLAYERS.find(x=>x.name===currentPlayer);
  document.getElementById('res-player-badge').textContent=`${currentPlayer}'s Result`;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-score').textContent=`${totalCorrect}/100`;
 
  const pb=document.getElementById('res-pb-banner');
  if(isPB&&pd.attempts.length>1){pb.textContent='🎉 Personal Best!';pb.style.display='block';}
  else{pb.style.display='none';}
 
  const em=Math.floor(elapsed/60),es=Math.floor(elapsed%60);
  document.getElementById('res-meta').innerHTML=`
    <div class="res-meta-item">⏱ <strong>${em}:${String(es).padStart(2,'0')}</strong> time</div>
    <div class="res-meta-item">⚡ <strong>${(elapsed/TOTAL).toFixed(1)}s</strong> per question</div>
    <div class="res-meta-item">${elapsed<=TARGET_SECONDS?'✅ Under':'❌ Over'} 6:30</div>
    <div class="res-meta-item">${pct>=0.75?'🔥':'📚'} <strong>${Math.round(pct*100)}%</strong></div>
  `;
 
  const catsEl=document.getElementById('res-cats'); catsEl.innerHTML='';
  CAT_ORDER.forEach(k=>{
    const cat=CATS[k]; const sc=catScores[k];
    const d=document.createElement('div'); d.className='res-cat';
    d.innerHTML=`<div class="res-cat-name">${cat.label}</div><div class="res-cat-score" style="color:${cat.color}">${sc}/25</div><div class="res-cat-bar-wrap"><div class="res-cat-bar-fill" style="width:${sc/PER_CAT*100}%;background:${cat.color}"></div></div>`;
    catsEl.appendChild(d);
  });
 
  // Mini leaderboard
  renderMiniLB();
 
  document.getElementById('worksheet-screen').style.display='none';
  document.getElementById('results-screen').style.display='flex';
  window.scrollTo(0,0);
 
  const hb=document.getElementById('btn-submit-header');
  hb.textContent='🏠 Home'; hb.style.background='var(--muted)'; hb.onclick=showPlayerScreen;
}
 
function renderMiniLB(){
  const mlb=document.getElementById('mini-lb');
  const ranked=PLAYERS.map(p=>{
    const pd=getPlayerData(p.name);
    return {name:p.name, color:p.color, best:pd.bestScore??-1, bestTime:pd.bestTime??99999, attempts:pd.attempts.length};
  }).filter(x=>x.best>=0).sort((a,b)=>b.best-a.best||a.bestTime-b.bestTime);
 
  if(ranked.length===0){mlb.style.display='none';return;}
  mlb.style.display='block';
 
  let html=`<div class="mini-lb-title">🏆 Leaderboard — Best Scores</div>`;
  ranked.forEach((r,i)=>{
    const rankClass=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const rankSymbol=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
    const isCurrent=r.name===currentPlayer;
    const tm=Math.floor(r.bestTime/60),ts=r.bestTime%60;
    html+=`<div class="mini-lb-row ${isCurrent?'highlight':''}">
      <div class="mini-rank ${rankClass}">${rankSymbol}</div>
      <div class="mini-info">
        <div class="mini-av" style="background:${r.color}">${r.name.slice(0,2).toUpperCase()}</div>
        <div class="mini-name">${r.name}</div>
      </div>
      <div class="mini-score">${r.best}/100</div>
      <div class="mini-time">${tm}:${String(ts).padStart(2,'0')}</div>
    </div>`;
  });
  // Show players with no attempts
  PLAYERS.filter(p=>!ranked.find(r=>r.name===p.name)).forEach(p=>{
    html+=`<div class="mini-lb-row">
      <div class="mini-rank" style="color:var(--muted)">—</div>
      <div class="mini-info"><div class="mini-av" style="background:${p.color}">${p.name.slice(0,2).toUpperCase()}</div><div class="mini-name" style="color:var(--muted)">${p.name}</div></div>
      <div class="mini-score" style="color:var(--muted)">—</div>
      <div class="mini-time" style="color:var(--muted)">—</div>
    </div>`;
  });
  mlb.innerHTML=html;
}
 
// ── LEADERBOARD SCREEN ──
function showLeaderboard(){
  document.getElementById('player-screen').style.display='none';
  document.getElementById('results-screen').style.display='none';
  document.getElementById('lb-screen').style.display='block';
  renderLBTabs('overview');
}
 
function renderLBTabs(active){
  const tabsEl=document.getElementById('lb-tabs');
  const tabs=[{id:'overview',label:'🏆 Overall'},...PLAYERS.map(p=>({id:p.name,label:p.name}))];
  tabsEl.innerHTML=tabs.map(t=>`<div class="lb-tab ${t.id===active?'active':''}" onclick="renderLBContent('${t.id}')">${t.label}</div>`).join('');
  renderLBContent(active);
}
 
function renderLBContent(tab){
  // Update active tab
  document.querySelectorAll('.lb-tab').forEach(t=>{
    t.classList.toggle('active', t.textContent.trim()===tab||t.textContent.trim()===(tab==='overview'?'🏆 Overall':tab));
  });
 
  const el=document.getElementById('lb-content'); el.innerHTML='';
 
  if(tab==='overview'){
    // Overall leaderboard table
    const ranked=PLAYERS.map(p=>{
      const pd=getPlayerData(p.name);
      return {p, pd, best:pd.bestScore??-1, bestTime:pd.bestTime??99999};
    }).sort((a,b)=>b.best-a.best||a.bestTime-b.bestTime);
 
    let html=`<div class="lb-table">
      <div class="lb-row header">
        <div></div><div>Player</div><div>Best Score</div><div>Best Time</div><div>Attempts</div>
      </div>`;
    ranked.forEach((r,i)=>{
      const hasData=r.best>=0;
      const rankSymbol=i===0&&hasData?'🥇':i===1&&hasData?'🥈':i===2&&hasData?'🥉':hasData?i+1:'—';
      const rankClass=i===0&&hasData?'r1':i===1&&hasData?'r2':i===2&&hasData?'r3':'';
      const tm=hasData?Math.floor(r.bestTime/60):0, ts=hasData?r.bestTime%60:0;
      html+=`<div class="lb-row">
        <div class="lb-rank ${rankClass}">${rankSymbol}</div>
        <div class="lb-player-info">
          <div class="lb-av" style="background:${r.p.color}">${r.p.name.slice(0,2).toUpperCase()}</div>
          <div>
            <div class="lb-pname">${r.p.name}</div>
            <div class="lb-attempts-sm">${r.pd.attempts.length} attempt${r.pd.attempts.length!==1?'s':''}</div>
          </div>
        </div>
        <div class="lb-val ${hasData?r.best>=75?'good':'meh':'none'}">${hasData?`${r.best}/100`:'—'}</div>
        <div class="lb-val ${hasData?r.bestTime<=TARGET_SECONDS?'good':'meh':'none'}">${hasData?`${tm}:${String(ts).padStart(2,'0')}`:'—'}</div>
        <div class="lb-val">${r.pd.attempts.length||'—'}</div>
      </div>`;
    });
    html+='</div>';
    el.innerHTML=html;
 
  } else {
    // Individual progress
    const p=PLAYERS.find(x=>x.name===tab);
    const pd=getPlayerData(tab);
    if(!p) return;
 
    if(pd.attempts.length===0){
      el.innerHTML=`<div style="text-align:center;padding:3rem;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;">No attempts yet for ${tab}</div>`;
      return;
    }
 
    const best=pd.bestScore;
    // Stats summary
    const avg=Math.round(pd.attempts.reduce((s,a)=>s+a.score,0)/pd.attempts.length);
    const bestT=pd.bestTime, bm=Math.floor(bestT/60), bs=bestT%60;
 
    let html=`<div class="lb-table" style="margin-bottom:1rem;">
      <div class="lb-row header"><div></div><div>Stat</div><div></div><div></div><div></div></div>
      <div class="lb-row"><div></div><div class="lb-pname">Best Score</div><div class="lb-val good">${best}/100</div><div></div><div></div></div>
      <div class="lb-row"><div></div><div class="lb-pname">Best Time</div><div class="lb-val ${bestT<=TARGET_SECONDS?'good':'meh'}">${bm}:${String(bs).padStart(2,'0')}</div><div></div><div></div></div>
      <div class="lb-row"><div></div><div class="lb-pname">Average Score</div><div class="lb-val">${avg}/100</div><div></div><div></div></div>
      <div class="lb-row"><div></div><div class="lb-pname">Total Attempts</div><div class="lb-val">${pd.attempts.length}</div><div></div><div></div></div>
    </div>`;
 
    // History table
    html+=`<div class="person-history">
      <div class="ph-header">
        <div class="lb-av" style="background:${p.color};width:32px;height:32px;font-size:0.8rem">${p.name.slice(0,2).toUpperCase()}</div>
        <div class="ph-title">${p.name}'s Attempt History</div>
      </div>
      <div class="ph-row header"><div>#</div><div>Score</div><div>Progress</div><div>Time</div></div>`;
 
    [...pd.attempts].reverse().forEach((a,i)=>{
      const num=pd.attempts.length-i;
      const isPB=(a.score===pd.bestScore);
      const am=Math.floor(a.time/60),as2=a.time%60;
      const barW=a.score/TOTAL*100;
      html+=`<div class="ph-row">
        <div class="ph-num">${num}</div>
        <div class="ph-score" style="color:${a.score>=75?'var(--correct)':'var(--text)'}">
          ${a.score}/100${isPB&&pd.attempts.length>1?'<span class="ph-pb">PB</span>':''}
        </div>
        <div><div class="ph-bar-wrap"><div class="ph-bar-fill" style="width:${barW}%;background:${p.color}"></div></div></div>
        <div class="ph-time">${am}:${String(as2).padStart(2,'0')}</div>
      </div>`;
    });
    html+='</div>';
    el.innerHTML=html;
  }
}
 
function showPlayerScreen(){
  clearInterval(timerInterval);
  document.getElementById('results-screen').style.display='none';
  document.getElementById('worksheet-screen').style.display='none';
  document.getElementById('lb-screen').style.display='none';
  document.getElementById('player-screen').style.display='flex';
  currentPlayer=null;
  renderPlayerGrid();
  document.getElementById('btn-go').classList.remove('active');
  document.getElementById('btn-go').textContent='Let\'s Go →';
}
 
function showReview(){
  document.getElementById('results-screen').style.display='none';
  document.getElementById('worksheet-screen').style.display='block';
  window.scrollTo(0,0);
}
 
// Boot
init();
</script>
</body>
</html>
